<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-overlay cart-bg">

<div class="container">

<h2>🛒 Your Cart</h2>

{% for item in cart %}
<div class="card">
    <p>{{item.name}}</p>
    <p>Rs.{{item.price}}</p>
</div>
{% endfor %}

<h3>Total: Rs.{{total}}</h3>

<a href="/checkout"><button>Checkout</button></a>
<a href="/"><button>⬅ Back</button></a>

</div>

</body>
</html>
