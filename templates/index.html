<!DOCTYPE html>
<html>
<head>
    <title>Cafe</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-overlay home-bg">

<div class="container">

<h1>☕ Cafe Menu</h1>
<h2>Select Category</h2>

{% for cat in categories %}
<div class="card">
    <h3>{{cat}}</h3>
    <a href="/products/{{cat}}">
        <button>View Items</button>
    </a>
</div>
{% endfor %}

<a href="/cart"><button>🛒 View Cart</button></a>

</div>

</body>
</html>
